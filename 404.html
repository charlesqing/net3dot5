<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 - Page Not Found | .NET Framework 3.5 SP1</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230078d4'/%3E%3Ctext x='16' y='22' font-size='18' font-weight='800' text-anchor='middle' fill='%23fff' font-family='Segoe UI,sans-serif'%3E.N%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 4rem; font-weight: 700; color: #0078d4; }
        p { font-size: 1rem; color: #666; margin: 1rem 0 2rem; }
        a { color: #0078d4; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
        .lang-bar {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
        .lang-bar button {
            background: none;
            border: 1px solid rgba(0,120,212,0.3);
            color: #0078d4;
            padding: 4px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            margin-left: 6px;
        }
        .lang-bar button.active {
            background: #0078d4;
            color: #fff;
        }
        .lang-bar button:hover { opacity: 0.8; }
        [data-lang] { display: none; }
        html[lang="en"] [data-lang="en"] { display: block; }
        html[lang="zh"] [data-lang="zh"] { display: block; }
    </style>
</head>
<body>
    <div class="lang-bar">
        <button onclick="setLang('en')" id="btn-en" class="active">English</button>
        <button onclick="setLang('zh')" id="btn-zh">中文</button>
    </div>
    <h1>404</h1>
    <p data-lang="en">Page not found</p>
    <p data-lang="zh">页面未找到</p>
    <a href="/">&larr; <span data-lang="en">Back to Home</span><span data-lang="zh">返回首页</span></a>
    <script>
    (function() {
        var saved = localStorage.getItem('lang');
        if (saved === 'zh') setLang('zh');
    })();
    function setLang(lang) {
        document.documentElement.lang = lang;
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        localStorage.setItem('lang', lang);
    }
    </script>
</body>
</html>
